<!DOCTYPE html>
<html>
    <meta charset="UTF-8">

    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        
        <link href="css/style.css" rel="stylesheet">
        <link href="css/main.css" rel="stylesheet">
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body id="body">
        <div class="documents">
            <img class="city-logo" src="https://static.wikia.nocookie.net/gtawiki/images/b/be/LosSantosSeal-GTAV.png"></img>
            <div id="header">
                <div class="title"></div>
                <div class="document_name"></div>
            </div>
            <div id="data"></div>
            <div id="signature"><p></p></div>
            <img id="document-photo" src="" >
            <img id="document-photo-mini" src="">
            <img id="document-image" src="">
        </div>
        
        <div class="badges">
            <img class="badge-icon" src=""></img>
            
            <div id="header">
                <div class="title"></div>
                <div class="badge_name"></div>
            </div>

            <div id="data"></div>
            <div id="data2"></div>
            <div id="signature"><p></p></div>
            
            <img id="badge-photo" src="">
            <img id="badge-image" src="./images/badge_inside.png">
            <img class="leather-badge" src="./images/leather_badge.png"></img>
        </div>

        <div class="help"></div>
        
        
        <div class="documents-menu">
            <div>
                <div class="header">
                    <p class="name"></p>
                    <div class="close">
                        <i class="fas fa-close"></i>
                    </div>
                </div>
                <div class="menu">
                    <div class="main">
                        <div data-type="licenses">
                            <div>
                                <div class="side-boxes">
                                    <div class="box" data-type="documents">
                                        <i class="fa-solid fa-id-card"></i>
                                        <div class="text">
                                            <div class="header"></div>
                                            <div class="title"></div>
                                        </div>
                                        <div class="licenses-list">
                                            <div></div>
                                        </div>
                                    </div>
                                    <div class="box" data-type="photos">
                                        <i class="fa-solid fa-image-portrait"></i>
                                        <div class="text">
                                            <div class="header"></div>
                                            <div class="title"></div>
                                        </div>
                                        <div class="photos-list">
                                            <div></div>
                                        </div>
                                    </div>
                                    <div class="box" data-type="owned-documents">
                                        <i class="fa-solid fa-id-card"></i>
                                        <div class="text">
                                            <div class="header"></div>
                                            <div class="title"></div>
                                        </div>
                                        <div class="documents-list">
                                            <div></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="check_document_menu">
            <div>
                <div class="header">
                    <p class="name"></p>
                    <div class="close">
                        <i class="fas fa-close"></i>
                    </div>
                </div>
                <div class="menu">
                    <div id="find">
                        <span></span>
                        <input>
                        <div class="search">
                            <p></p>
                        </div>
                    </div>
                    <div id="loading">
                        <div class="loader"></div>
                        <p></p>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        
        <script src="../config/metadata.js" type="text/javascript"></script>
        <script src="js/script.js" type="text/javascript"></script>
        <script src="js/loads.js" type="text/javascript"></script>
    </body>

</html>
