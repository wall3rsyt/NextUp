    <script>
    async function onScriptError() {
      try {
        await fetch('https://' + GetParentResourceName() + '/nuibroke', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ timestamp: Date.now() })
        });
      } catch (e) { }
    }
  </script>
  <script onerror="onScriptError()" type="module" crossorigin src="./script.js"></script>
  <link rel="modulepreload" crossorigin href="./vendor.js">
  <link rel="stylesheet" crossorigin href="./style.css">
</head>
