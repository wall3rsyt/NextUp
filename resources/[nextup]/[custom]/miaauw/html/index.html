<!DOCTYPE html>
<html lang="nl" style="background:transparent!important;margin:0;padding:0;">
<head>
  <meta charset="UTF-8"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      background: transparent !important;
      background-color: transparent !important;
    }

    body {
      font-family: 'Exo 2', Arial, sans-serif;
      background: transparent !important;
      background-color: transparent !important;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 10px;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      overflow: hidden;
    }

    .bar {
      display: flex;
      align-items: center;
      gap: 2px;
      background: linear-gradient(135deg, rgba(5,15,35,0.55) 0%, rgba(10,25,60,0.55) 100%);
      border: 1px solid rgba(65,130,255,0.35);
      border-top: 1px solid rgba(100,170,255,0.5);
      border-radius: 8px;
      padding: 10px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      transition: opacity 0.25s ease;
      box-shadow: 0 0 20px rgba(30,90,255,0.15), inset 0 1px 0 rgba(120,180,255,0.1);
    }

    .bar.visible { opacity: 1; }

    .item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
    }

    .divider {
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, transparent, rgba(65,130,255,0.4), transparent);
    }

    .icon { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .icon img { width: 22px; height: 22px; object-fit: contain; }

    .label { font-size: 12px; color: rgba(160,200,255,0.5); }

    .value { font-size: 16px; font-weight: 700; color: #e8f0ff; letter-spacing: 0.3px; }
    .value .max { font-size: 13px; font-weight: 400; color: rgba(100,150,255,0.45); }

    .ping-good { color: #4dffaa; text-shadow: 0 0 8px rgba(77,255,170,0.4); }
    .ping-ok   { color: #ffcc44; text-shadow: 0 0 8px rgba(255,200,60,0.4); }
    .ping-bad  { color: #ff5555; text-shadow: 0 0 8px rgba(255,80,80,0.4); }

    .col-politie { color: #6ab0ff; text-shadow: 0 0 8px rgba(80,150,255,0.35); }
    .col-ambu    { color: #ff6060; text-shadow: 0 0 8px rgba(255,80,80,0.3); }
    .col-pech    { color: #ffcc44; text-shadow: 0 0 8px rgba(255,200,60,0.3); }
  </style>
</head>
<body>

<div class="bar" id="bar">
  <div class="item">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)" width="18" height="18">
        <path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
      </svg>
    </div>
    <span class="value"><span id="players">0</span><span class="max">/<span id="max-players">0</span></span></span>
  </div>
  <div class="divider"></div>
  <div class="item">
    <div class="icon"><img src="images/politie.png" alt=""/></div>
    <span class="value col-politie"><span id="politie-on">0</span><span class="max">/<span id="max-politie">0</span></span></span>
  </div>
  <div class="divider"></div>
  <div class="item">
    <div class="icon"><img src="images/ambu.png" alt=""/></div>
    <span class="value col-ambu"><span id="ambu-on">0</span><span class="max">/<span id="max-ambu">0</span></span></span>
  </div>
  <div class="divider"></div>
  <div class="item">
    <div class="icon"><img src="images/pech.png" alt=""/></div>
    <span class="value col-pech"><span id="pech-on">0</span><span class="max">/<span id="max-pech">0</span></span></span>
  </div>
  <div class="divider"></div>
  <div class="item">
    <div class="icon">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="rgba(255,255,255,0.5)">
        <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
      </svg>
    </div>
    <span class="value" id="ping-val">0</span>
    <span class="label">ms</span>
  </div>
</div>

<script>
  // FiveM NUI transparantie fix
  document.documentElement.style.setProperty('background', 'transparent', 'important');
  document.documentElement.style.setProperty('background-color', 'transparent', 'important');
  document.body.style.setProperty('background', 'transparent', 'important');
  document.body.style.setProperty('background-color', 'transparent', 'important');

  function setPing(ms) {
    const el = document.getElementById('ping-val');
    el.textContent = ms;
    el.className = 'value ' + (ms < 80 ? 'ping-good' : ms < 150 ? 'ping-ok' : 'ping-bad');
  }

  window.addEventListener('message', (e) => {
    const d = e.data;
    if (d.type === 'show') document.getElementById('bar').classList.add('visible');
    if (d.type === 'hide') document.getElementById('bar').classList.remove('visible');
    if (d.type === 'update') {
      if (d.players    !== undefined) document.getElementById('players').textContent     = d.players;
      if (d.maxPlayers !== undefined) document.getElementById('max-players').textContent = d.maxPlayers;
      if (d.politie    !== undefined) document.getElementById('politie-on').textContent  = d.politie;
      if (d.maxPolitie !== undefined) document.getElementById('max-politie').textContent = d.maxPolitie;
      if (d.ambu       !== undefined) document.getElementById('ambu-on').textContent     = d.ambu;
      if (d.maxAmbu    !== undefined) document.getElementById('max-ambu').textContent    = d.maxAmbu;
      if (d.pech       !== undefined) document.getElementById('pech-on').textContent     = d.pech;
      if (d.maxPech    !== undefined) document.getElementById('max-pech').textContent    = d.maxPech;
      if (d.ping       !== undefined) setPing(d.ping);
    }
  });
</script>
</body>
</html>
